<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🌺 Prompt Flores Hermosas</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#ff0080,#7928ca,#2afadf);
background-size:600% 600%;
animation:fondo 15s ease infinite;
font-family:Arial;
color:white;
}

@keyframes fondo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.box{
background:rgba(0,0,0,0.6);
padding:35px;
border-radius:20px;
width:700px;
text-align:center;
box-shadow:0 0 30px rgba(255,0,200,0.7);
}

h1{
font-size:32px;
margin-bottom:20px;
}

textarea{
width:100%;
height:200px;
background:#111;
color:#00ffcc;
border:none;
border-radius:10px;
padding:15px;
font-size:14px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:10px;
background:#ff2da0;
color:white;
cursor:pointer;
box-shadow:0 0 15px #ff2da0;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="box">

<h1>🌺 Prompt Flores Ultra Hermosas</h1>

<textarea id="prompt">
A magical field of the most beautiful flowers ever seen, glowing roses, vibrant cherry blossoms, exotic orchids, colorful lilies and tropical flowers blooming together. Petals floating in the air, golden sunset light, dreamy atmosphere, cinematic lighting, ultra detailed petals, fantasy garden, vibrant colors, ultra realistic textures, depth of field, masterpiece, HDR, 8K ultra resolution.
</textarea>

<br>

<button onclick="copiar()">Copiar Prompt</button>

</div>

<script>

function copiar(){
let texto=document.getElementById("prompt");
texto.select();
document.execCommand("copy");
alert("🌺 Prompt copiado");
}

</script>

</body>
</html>
